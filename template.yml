AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Job Scrapper template

# PARAMETERS
Parameters:
    ApifyApiKey:
        Type: String
        Description: Apify Api key SSM path
        Default: /job-scraper/APIFY_API_KEY
    OpenaiApiKey:
        Type: String
        Description: Openai Api key SSM path
        Default: /job-scraper/OPENAI_API_KEY
    DatabaseUrl:
        Type: String
        Description: Neon Database Url SSM path
        Default: /job-scraper/DATABASE_URL
    MasterEmail:
        Type: String
        Description: Sender email SSM path
        Default: /job-scraper/MASTER_EMAIL
    ReceiverEmail:
        Type: String
        Description: Receiver email SSM path
        Default: /job-scraper/RECEIVER_EMAIL

Resources:
    # Event Bridge Invoke Lambda
    MainLambda:
        Type: AWS::Serverless::Function
        Properties:
            Runtime: nodejs24.x
            Architectures:
                - arm64
            MemorySize: 1000
            LoggingConfig:
                LogFormat: JSON
            CodeUri: ./
            Handler: src/lambda.handler
            Timeout: 600
            Policies:
                - AWSLambdaBasicExecutionRole
                - SSMParameterReadPolicy:
                      ParameterName: 'job-scraper/*'
                - Statement:
                      - Effect: Allow
                        Action:
                            - ses:sendEmail
                            - ses:SendRawEmail
                        Resource: '*'
            Environment:
                Variables:
                    APIFY_API_KEY: !Ref ApifyApiKey
                    OPENAI_API_KEY: !Ref OpenaiApiKey
                    DATABASE_URL: !Ref DatabaseUrl
                    MASTER_EMAIL: !Ref MasterEmail
                    RECEIVER_EMAIL: !Ref ReceiverEmail

            Events:
                # cron job runs everyday on 7AM
                Schedule:
                    Type: ScheduleV2
                    Properties:
                        ScheduleExpression: cron(0 7 * * ? *)
                        ScheduleExpressionTimezone: 'Asia/Kolkata'
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Target: es2022
                Format: esm
                OutExtension:
                    - .js=.mjs
                Loader:
                    - .txt=text
                Sourcemap: true
                Banner:
                    - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);
                External:
                    - '@aws-sdk/*'
                    - 'aws-lambda'
                EntryPoints:
                    - src/lambda.ts

    MyLogGroup:
        Type: AWS::Logs::LogGroup
        Properties:
            LogGroupName: !Sub '/aws/lambda/${MainLambda}'
            RetentionInDays: 3
