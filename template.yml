AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Job Scrapper template

# PARAMETERS
Parameters:
    ApifyToken:
        Type: AWS::SSM::Parameter::Value<String>
        Description: Apify Api key
        Default: /job-scraper/APIFY_TOKEN
    OpenaiToken:
        Type: AWS::SSM::Parameter::Value<String>
        Description: Openai Api key
        Default: /job-scraper/OPENAI_API_KEY
    DatabaseUrl:
        Type: AWS::SSM::Parameter::Value<String>
        Description: Neon Database Url
        Default: /job-scraper/DATABASE_URL

Resources:
    # Event Bridge Invoke Lambda
    MainLambda:
        Type: AWS::Serverless::Function
        Properties:
            Runtime: nodejs24.x
            Architectures:
                - arm64
            MemorySize: 1000
            LoggingConfig:
                LogFormat: JSON
            CodeUri: ./
            Handler: src/lambda.handler
            Timeout: 600
            Policies:
                - AWSLambdaBasicExecutionRole
            Environment:
                Variables:
                    APIFY_TOKEN: !Ref ApifyToken
                    OPENAI_TOKEN: !Ref OpenaiToken
                    DATABASE_URL: !Ref DatabaseUrl

            Events:
                # cron job runs everyday on 7AM
                Schedule:
                    Type: ScheduleV2
                    Properties:
                        ScheduleExpression: cron(0 7 * * ? *)
                        ScheduleExpressionTimezone: 'Asia/Kolkata'
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Minify: true
                Target: es2022
                Format: esm
                OutExtension:
                    .js: .mjs
                Sourcemap: true
                External:
                    - '@aws-sdk/*'
                    - 'aws-lambda'
                EntryPoints:
                    - src/lambda.ts

    MyLogGroup:
        Type: AWS::Logs::LogGroup
        Properties:
            LogGroupName: !Sub '/aws/lambda/${MainLambda}'
            RetentionInDays: 3
