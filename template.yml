AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Job Scrapper template

# PARAMETERS
Parameters:
    AppEnv:
        Type: String
        Description: Application environment (dev/prod)
        Default: prod
    ApifyApiKey:
        Type: String
        Description: Apify Api key SSM path
        Default: /job-scraper/APIFY_API_KEY
    OpenaiApiKey:
        Type: String
        Description: Openai Api key SSM path
        Default: /job-scraper/OPENAI_API_KEY
    DatabaseUrl:
        Type: String
        Description: Neon Database Url SSM path
        Default: /job-scraper/DATABASE_URL
    AdminApiKey:
        Type: String
        Description: Admin API Key for security SSM path
        Default: /job-scraper/ADMIN_API_KEY
    MinMatchScore:
        Type: String
        Description: Minimum AI match score for a job to be considered relevant
        Default: "60"
    TelegramMatchedJobsBotToken:
        Type: String
        Description: Telegram Bot Token for matched jobs notifications
        Default: /job-scraper/TELEGRAM_MATCHED_JOBS_BOT_TOKEN
    TelegramDroppedJobsBotToken:
        Type: String
        Description: Telegram Bot Token for dropped jobs notifications
        Default: /job-scraper/TELEGRAM_DROPPED_JOBS_BOT_TOKEN
    TelegramMatchedJobsChatId:
        Type: String
        Description: Telegram Chat ID for matched jobs notifications
        Default: /job-scraper/TELEGRAM_MATCHED_JOBS_CHAT_ID
    TelegramDroppedJobsChatId:
        Type: String
        Description: Telegram Chat ID for dropped jobs notifications
        Default: /job-scraper/TELEGRAM_DROPPED_JOBS_CHAT_ID

Resources:
    # Event Bridge Invoke Lambda
    MainLambda:
        Type: AWS::Serverless::Function
        Properties:
            Runtime: nodejs24.x
            Architectures:
                - arm64
            MemorySize: 1000
            ReservedConcurrentExecutions: 1
            LoggingConfig:
                LogFormat: JSON
            CodeUri: ./
            Handler: src/lambda.handler
            Timeout: 600
            Policies:
                - AWSLambdaBasicExecutionRole
                - SSMParameterReadPolicy:
                      ParameterName: 'job-scraper/*'
                - Statement:
                      - Effect: Allow
                        Action:
                            - ses:sendEmail
                            - ses:SendRawEmail
                        Resource: '*'
            Environment:
                Variables:
                    APIFY_API_KEY_PATH: !Ref ApifyApiKey
                    OPENAI_API_KEY_PATH: !Ref OpenaiApiKey
                    DATABASE_URL_PATH: !Ref DatabaseUrl
                    MIN_MATCH_SCORE: !Ref MinMatchScore
                    APP_ENV: !Ref AppEnv
                    TELEGRAM_MATCHED_JOBS_BOT_TOKEN_PATH: !Ref TelegramMatchedJobsBotToken
                    TELEGRAM_MATCHED_JOBS_CHAT_ID_PATH: !Ref TelegramMatchedJobsChatId
                    TELEGRAM_DROPPED_JOBS_BOT_TOKEN_PATH: !Ref TelegramDroppedJobsBotToken
                    TELEGRAM_DROPPED_JOBS_CHAT_ID_PATH: !Ref TelegramDroppedJobsChatId
                    ADMIN_API_KEY_PATH: !Ref AdminApiKey

            Events:
                MorningRun:
                    Type: ScheduleV2
                    Properties:
                        ScheduleExpression: cron(0 9 ? * MON-FRI *)
                        ScheduleExpressionTimezone: 'Asia/Kolkata'
                        Input: !Sub '{"lookbackHours": 18, "adminApiKey": "${AdminApiKey}"}'
                        RetryPolicy:
                            MaximumRetryAttempts: 0
                            MaximumEventAgeInSeconds: 3600
                AfternoonRun:
                    Type: ScheduleV2
                    Properties:
                        ScheduleExpression: cron(0 13 ? * MON-FRI *)
                        ScheduleExpressionTimezone: 'Asia/Kolkata'
                        Input: !Sub '{"lookbackHours": 4, "adminApiKey": "${AdminApiKey}"}'
                        RetryPolicy:
                            MaximumRetryAttempts: 0
                            MaximumEventAgeInSeconds: 3600
                EveningRun:
                    Type: ScheduleV2
                    Properties:
                        ScheduleExpression: cron(30 17 ? * MON-FRI *)
                        ScheduleExpressionTimezone: 'Asia/Kolkata'
                        Input: !Sub '{"lookbackHours": 4.5, "adminApiKey": "${AdminApiKey}"}'
                        RetryPolicy:
                            MaximumRetryAttempts: 0
                            MaximumEventAgeInSeconds: 3600
                SundayMorningRun:
                    Type: ScheduleV2
                    Properties:
                        ScheduleExpression: cron(0 8 ? * SUN *)
                        ScheduleExpressionTimezone: 'Asia/Kolkata'
                        Input: !Sub '{"lookbackHours": 48, "adminApiKey": "${AdminApiKey}"}'
                        RetryPolicy:
                            MaximumRetryAttempts: 0
                            MaximumEventAgeInSeconds: 3600
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Target: es2022
                Format: esm
                OutExtension:
                    - .js=.mjs
                Loader:
                    - .txt=text
                Sourcemap: true
                Banner:
                    - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);
                External:
                    - '@aws-sdk/*'
                    - 'aws-lambda'
                EntryPoints:
                    - src/lambda.ts

    AdminLambda:
        Type: AWS::Serverless::Function
        Properties:
            Runtime: nodejs24.x
            Architectures:
                - arm64
            MemorySize: 512
            LoggingConfig:
                LogFormat: JSON
            CodeUri: ./
            Handler: src/admin.handler
            Timeout: 30
            Policies:
                - AWSLambdaBasicExecutionRole
                - SSMParameterReadPolicy:
                      ParameterName: 'job-scraper/*'
            Environment:
                Variables:
                    DATABASE_URL_PATH: !Ref DatabaseUrl
                    APP_ENV: !Ref AppEnv
                    ADMIN_API_KEY_PATH: !Ref AdminApiKey
            Events:
                AdminApi:
                    Type: Api
                    Properties:
                        Path: /tokens
                        Method: ANY
        Metadata:
            BuildMethod: esbuild
            BuildProperties:
                Target: es2022
                Format: esm
                OutExtension:
                    - .js=.mjs
                Sourcemap: true
                Banner:
                    - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);
                External:
                    - '@aws-sdk/*'
                    - 'aws-lambda'
                EntryPoints:
                    - src/admin.ts

    MyLogGroup:
        Type: AWS::Logs::LogGroup
        Properties:
            LogGroupName: !Sub '/aws/lambda/${MainLambda}'
            RetentionInDays: 3

Outputs:
    ApiGatewayUrl:
        Description: "API Gateway URL for Admin API"
        Value: !Sub "https://${AdminLambda}.execute-api.${AWS::Region}.amazonaws.com/Prod/tokens"
